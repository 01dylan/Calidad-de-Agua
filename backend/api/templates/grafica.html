<!DOCTYPE html>
<html>
<head>
    <title>Gráficas de Agua</title>


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Gráficas de Calidad del Agua</h2>

<canvas id="tempChart"></canvas>
<canvas id="turbChart"></canvas>
<canvas id="condChart"></canvas>

<!-- DATOS DESDE DJANGO -->
{{ labels|json_script:"labels-data" }}
{{ temperaturas|json_script:"temp-data" }}
{{ turbidez|json_script:"turb-data" }}
{{ conductividad|json_script:"cond-data" }}

<script>
    const labels = JSON.parse(document.getElementById("labels-data").textContent);
    const temperaturas = JSON.parse(document.getElementById("temp-data").textContent);
    const turbidez = JSON.parse(document.getElementById("turb-data").textContent);
    const conductividad = JSON.parse(document.getElementById("cond-data").textContent);

    console.log(labels); // 👈 para verificar

    //  Temperatura
    new Chart(document.getElementById("tempChart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Temperatura',
                data: temperaturas,
                borderColor: 'red'
            }]
        }
    });

    //  Turbidez
    new Chart(document.getElementById("turbChart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Turbidez',
                data: turbidez,
                borderColor: 'blue'
            }]
        }
    });

    // Conductividad
    new Chart(document.getElementById("condChart"), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Conductividad',
                data: conductividad,
                borderColor: 'green'
            }]
        }
    });
</script>

</body>
</html>
